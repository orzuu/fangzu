<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>房租水电物业计算器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h2 {
            margin-top: 0;
            font-size: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #666;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px; 
        }
        .hint {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
            line-height: 1.4;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        button:active {
            background-color: #005bb5;
        }
        #result {
            margin-bottom: 30px;
            padding: 15px;
            background-color: #e8f5e9;
            border-left: 5px solid #4caf50;
            border-radius: 5px;
            display: none; 
            font-size: 16px;
            line-height: 1.8;
        }
        .total-price {
            font-size: 22px;
            font-weight: bold;
            color: #e53935;
            margin-top: 10px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>📅 房租与物业费 (按天数)</h2>
        <div class="form-group">
            <label>结算天数：</label>
            <input type="number" id="daysCount" placeholder="请输入居住天数">
        </div>
        <div class="hint">房租：117元/天 | 物业费：12.3元/天</div>
    </div>

    <div class="card">
        <h2>💧 水费计算</h2>
        <div class="form-group">
            <label>当前水表度数：</label>
            <input type="number" id="waterCurr" placeholder="请输入当前水表度数" step="0.01">
            <div class="hint">公式：(当前度数 - 64) × 5.54元/吨<br>单价明细：基础3.69 + 污水1.2 + 垃圾0.65</div>
        </div>
    </div>

    <div class="card">
        <h2>⚡ 电费计算</h2>
        <div class="form-group">
            <label>当前电表度数：</label>
            <input type="number" id="elecCurr" placeholder="请输入当前电表度数" step="0.01">
            <div class="hint">公式：(当前度数 - 4206.74) × 0.6元/度</div>
        </div>
    </div>

    <div class="card">
        <h2>🔥 燃气费计算</h2>
        <div class="form-group">
            <label>当前燃气表度数：</label>
            <input type="number" id="gasCurr" placeholder="请输入当前燃气表度数" step="0.01">
            <div class="hint">公式：(当前度数 - 1374) × 3.4元/m³</div>
        </div>
    </div>

    <button onclick="calculate()">开始计算</button>

    <div id="result">
        </div>

    <script>
        // ==========================================
        // 配置参数区
        // ==========================================
        const DAILY_RENT = 117;            // 房租：117元/天
        const DAILY_PROPERTY = 12.3;       // 物业费：12.3元/天
        
        const WATER_BASE_READING = 64;     // 水表固定底数
        const WATER_BASE = 3.69;           // 基础水费
        const WATER_SEWAGE = 1.2;          // 污水处理费
        const WATER_GARBAGE = 0.65;        // 垃圾处理费
        const WATER_TOTAL_PRICE = WATER_BASE + WATER_SEWAGE + WATER_GARBAGE; // 5.54元/吨
        
        const ELEC_BASE_READING = 4206.74; // 电表固定底数
        const ELECTRIC_PRICE = 0.6;        // 电费单价：0.6元/度

        const GAS_BASE_READING = 1374;     // 燃气表固定底数
        const GAS_PRICE = 3.4;             // 燃气费单价：3.4元/m³
        // ==========================================

        function calculate() {
            // 1. 获取天数
            const daysDiff = parseInt(document.getElementById('daysCount').value) || 0;
            
            if (daysDiff <= 0) {
                alert("请输入有效的结算天数！");
                return;
            }

            // 房租和物业费总价
            const rentTotal = daysDiff * DAILY_RENT;
            const propertyTotal = daysDiff * DAILY_PROPERTY;

            // 2. 水费计算 (当前表 - 64) * 5.54
            const waterCurr = parseFloat(document.getElementById('waterCurr').value) || WATER_BASE_READING;
            let waterUsage = waterCurr - WATER_BASE_READING;
            if (waterUsage < 0) waterUsage = 0;
            const waterTotal = waterUsage * WATER_TOTAL_PRICE;

            // 3. 电费计算 (当前表 - 4206.74) * 0.6
            const elecCurr = parseFloat(document.getElementById('elecCurr').value) || ELEC_BASE_READING;
            let elecUsage = elecCurr - ELEC_BASE_READING;
            if (elecUsage < 0) elecUsage = 0; 
            const elecTotal = elecUsage * ELECTRIC_PRICE;

            // 4. 燃气费计算 (当前表 - 1374) * 3.4
            const gasCurr = parseFloat(document.getElementById('gasCurr').value) || GAS_BASE_READING;
            let gasUsage = gasCurr - GAS_BASE_READING;
            if (gasUsage < 0) gasUsage = 0;
            const gasTotal = gasUsage * GAS_PRICE;

            // 5. 总计计算
            const finalTotal = rentTotal + propertyTotal + waterTotal + elecTotal + gasTotal;

            // 6. 渲染结果页
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block'; 
            resultDiv.innerHTML = `
                <div>🗓️ 结算总天数：<b>${daysDiff}</b> 天</div>
                <div style="margin-left:15px;">• 房租金额：¥${rentTotal.toFixed(2)} (${DAILY_RENT}元/天)</div>
                <div style="margin-left:15px;">• 物业金额：¥${propertyTotal.toFixed(2)} (${DAILY_PROPERTY}元/天)</div>
                
                <div style="margin-top:8px;">💧 实际用水：<b>${waterUsage.toFixed(2)}</b> 吨 (¥${waterTotal.toFixed(2)})</div>
                <div class="hint" style="margin-left:15px; margin-top:0;">*明细: (${waterCurr} - ${WATER_BASE_READING}) × ${WATER_TOTAL_PRICE}元/吨</div>
                
                <div style="margin-top:8px;">⚡ 实际用电：<b>${elecUsage.toFixed(2)}</b> 度 (¥${elecTotal.toFixed(2)})</div>
                <div class="hint" style="margin-left:15px; margin-top:0;">*明细: (${elecCurr} - ${ELEC_BASE_READING}) × ${ELECTRIC_PRICE}元/度</div>
                
                <div style="margin-top:8px;">🔥 实际燃气：<b>${gasUsage.toFixed(2)}</b> m³ (¥${gasTotal.toFixed(2)})</div>
                <div class="hint" style="margin-left:15px; margin-top:0;">*明细: (${gasCurr} - ${GAS_BASE_READING}) × ${GAS_PRICE}元/m³</div>
                
                <div class="total-price">💵 总计应收：¥${finalTotal.toFixed(2)}</div>
            `;
            
            // 计算完自动滚动到底部方便查看结果
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    </script>
</body>
</html>
