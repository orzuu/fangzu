        .card {

        }

        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #666;
        }
        input[type="number"] {
            width: 100%;

            border: 1px solid #ccc;

        }
        button {
            width: 100%;
            padding: 15px;

            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        button:active {
            background-color: #005bb5;
        }
        #result {
            margin-bottom: 30px;
            padding: 15px;
            background-color: #e8f5e9;
            border-left: 5px solid #4caf50;
            border-radius: 5px;
            display: none; 
            font-size: 16px;
            line-height: 1.8;
        }
        .total-price {
            font-size: 20px;
            font-weight: bold;
            color: #e53935;
            margin-top: 10px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        .refund-price {
            font-size: 24px;
            font-weight: bold;
            color: #007aff;
            margin-top: 5px;
        }
    </style>
</head>
