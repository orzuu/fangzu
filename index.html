<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>房租水电物业计算器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }
        .card {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        h2 {
            margin-top: 0;
            font-size: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #666;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px; 
        }
        .hint {
            font-size: 13px;
            color: #888;
            margin-top: 5px;
            line-height: 1.5;
        }
        .highlight-text {
            color: #e53935;
            font-weight: bold;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        button:active {
            background-color: #005bb5;
        }
        #result {
            margin-bottom: 30px;
            padding: 15px;
            background-color: #e8f5e9;
            border-left: 5px solid #4caf50;
            border-radius: 5px;
            display: none; 
            font-size: 16px;
            line-height: 1.8;
        }
        .total-price {
            font-size: 20px;
            font-weight: bold;
            color: #e53935;
            margin-top: 10px;
            border-top: 1px solid #ccc;
            padding-top: 10px;
        }
        .refund-price {
            font-size: 24px;
            font-weight: bold;
            color: #007aff;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>📅 房租与物业费 (自动计算)</h2>
        <div class="form-group" style="background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #e9ecef;">
            <label id="daysLabel" style="margin: 0; color: #333; font-size: 16px;">正在计算天数...</label>
        </div>
        <div class="hint" style="margin-top: 10px;">房租：117元/天 | 基础物业：12.3元/天</div>
    </div>

    <div class="card">
        <h2>💧 水费计算</h2>
        <div class="form-group">
            <label>当前水表立方数：</label>
            <input type="number" id="waterCurr" placeholder="请输入当前水表立方数" step="0.01" value="74">
            <div class="hint">
                单价明细：基础水费 3.69 + 污水处理 1.2 + 垃圾处理 0.65 = <span class="highlight-text">5.54元/立方</span><br>
                计算公式：(当前立方数 - 64) × 5.54元/立方
            </div>
        </div>
    </div>

    <div class="card">
        <h2>⚡ 电费计算</h2>
        <div class="form-group">
            <label>当前电表度数：</label>
            <input type="number" id="elecCurr" placeholder="请输入当前电表度数" step="0.01" value="4455">
            <div class="hint">计算公式：(当前度数 - 4206.74) × 0.6元/
